# Kiosk NetworkManager configuration
[main]
plugins=ifupdown,keyfile

[ifupdown]
managed=true

# Low-frequency NetworkManager connectivity checks distinguish a usable
# Internet route from a captive portal or a merely local link.  The watcher
# reads the cached state and never performs its own external probe.
[connectivity]
uri=http://nmcheck.gnome.org/check_network_status.txt
response=NetworkManager is online
interval=300
timeout=5
