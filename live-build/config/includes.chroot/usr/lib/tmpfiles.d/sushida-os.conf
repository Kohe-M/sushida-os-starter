# Volatile state for the kiosk session.  /run is a tmpfs and is recreated
# on every boot; no browser or kiosk state is written to persistent storage.
d /run/sushida-os             0750 kiosk kiosk - -
d /run/sushida-os/home        0700 kiosk kiosk - -
d /run/sushida-os/chromium    0700 kiosk kiosk - -
d /run/sushida-os/cache       0700 kiosk kiosk - -
d /run/sushida-os/tmp         0700 kiosk kiosk - -
d /run/sushida-os/downloads   0700 kiosk kiosk - -
d /run/sushida-os/xdg-runtime 0700 kiosk kiosk - -
