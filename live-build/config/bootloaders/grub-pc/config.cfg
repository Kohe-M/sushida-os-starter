# Entry 0 below is an explicitly selected QEMU-only software-renderer path.
# Entry 1 is live-build's generated production entry and remains the default.
set default=1
set timeout_style=menu
set timeout=3

menuentry "QEMU smoke test (software renderer)" --hotkey=q {
    linux /live/vmlinuz boot=live components console=ttyS0,115200n8 systemd.setenv=WLR_RENDERER_ALLOW_SOFTWARE=1
    initrd /live/initrd.img
}

if [ x$feature_default_font_path = xy ] ; then
    font=unicode
else
    font=$prefix/unicode.pf2
fi

# Copied from the Debian live-build default template.
if loadfont $font ; then
    set gfxmode=800x600
    set gfxpayload=keep
    insmod efi_gop
    insmod efi_uga
    insmod video_bochs
    insmod video_cirrus
else
    set gfxmode=auto
    insmod all_video
fi

insmod gfxterm
insmod png

source /boot/grub/theme.cfg

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1
