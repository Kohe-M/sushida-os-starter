# Prevent unauthenticated menu editing (e) and command-line access (c).
# No password is configured, so authentication is impossible and these keys
# are effectively disabled.  The production entry below is --unrestricted so
# it boots without credentials.
set superusers="kiosk"

# Direct boot entry that uses the kernel symlinks always created by live-build.
# The symlinks /live/vmlinuz and /live/initrd.img point to the versioned files
# and are safe to use because the ISO filesystem carries Rock Ridge / POSIX
# symlink support.
menuentry "Sushi-da OS (amd64)" --unrestricted --hotkey=l {
	set gfxpayload=keep
	echo "Loading Linux ..."
	linux	/live/vmlinuz boot=live components
	echo "Loading initial ramdisk ..."
	initrd	/live/initrd.img
}

set default=0
set timeout_style=menu
set timeout=3

if [ x$feature_default_font_path = xy ] ; then
    font=unicode
else
    font=$prefix/unicode.pf2
fi

# Copied from the Debian live-build default template.
if loadfont $font ; then
    set gfxmode=800x600
    set gfxpayload=keep
    insmod efi_gop
    insmod efi_uga
    insmod video_bochs
    insmod video_cirrus
else
    set gfxmode=auto
    insmod all_video
fi

insmod gfxterm
insmod png

source /boot/grub/theme.cfg

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1
