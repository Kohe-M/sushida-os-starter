label qemu-smoke-amd64
	menu label ^QEMU smoke test (software renderer)
	linux /live/vmlinuz
	initrd /live/initrd.img
	append boot=live components console=ttyS0,115200n8 systemd.setenv=WLR_RENDERER=pixman systemd.setenv=WLR_RENDERER_ALLOW_SOFTWARE=1 systemd.default_standard_output=journal+console systemd.default_standard_error=journal+console
